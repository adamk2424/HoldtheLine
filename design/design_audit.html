<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hold the Line - Design Audit Report</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {

    margin: 0 auto;
  }
  h1 {
    color: #00e5ff;
    text-align: center;
    font-size: 2em;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 3px;
  }
  .subtitle {
    text-align: center;
    color: #576574;
    margin-bottom: 10px;
    font-size: 0.9em;
  }

    display: flex;
    justify-content: center;
    gap: 24px;
    margin: 16px 0 24px 0;
    flex-wrap: wrap;
  }
  .summary-stat {
    text-align: center;

    border: 1px solid #1e2a3a;

  }
  .summary-stat .num { font-size: 1.8em; font-weight: 700; }

  .summary-stat.partial .num { color: #ffab00; }
  .summary-stat.fail .num { color: #ff5252; }
  .summary-stat.fixed .num { color: #40c4ff; }

  /* Filter Buttons */
  .filter-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 6px 16px;
    border: 1px solid #1e2a3a;
    border-radius: 20px;

    border: 1px solid #1e2a3a;
    border-radius: 8px;
    margin-bottom: 16px;

    background: #1a2332;
    padding: 14px 20px;

    display: flex;
    justify-content: space-between;
    align-items: center;

  .section-header:hover { background: #1e2a3a; }

    color: #00e5ff;
    font-size: 1.1em;
    letter-spacing: 1px;

    display: flex;
    gap: 8px;
    font-size: 0.8em;
  }
  .section-stats span {
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }
  .section-body { padding: 0; }
  .section-body.collapsed { display: none; }

  /* Individual Question */
  .question-item {
    padding: 16px 20px;
    border-bottom: 1px solid #1a2332;
  }
  .question-item:last-child { border-bottom: none; }
  .question-item.hidden { display: none; }

    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 8px;
  }
  .q-number {
    color: #00e5ff;
    font-weight: 700;
    font-size: 0.9em;
    white-space: nowrap;
  }
  .q-text {
    font-weight: 600;
    color: #dfe6e9;
    font-size: 0.92em;
    line-height: 1.4;

    padding: 3px 12px;

    font-weight: 700;

  .status-fail { background: rgba(255,82,82,0.15); color: #ff5252; border: 1px solid rgba(255,82,82,0.3); }
  .status-partial { background: rgba(255,171,0,0.15); color: #ffab00; border: 1px solid rgba(255,171,0,0.3); }
  .status-fixed { background: rgba(64,196,255,0.15); color: #40c4ff; border: 1px solid rgba(64,196,255,0.3); }

  .answer-block {
    background: #0d1117;
    border: 1px solid #1e2a3a;
    border-radius: 6px;
    padding: 12px 14px;
    margin-top: 8px;
    font-size: 0.88em;
    line-height: 1.5;
  }
  .answer-block .label {
    font-size: 0.75em;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .answer-block .label.ans-label { color: #576574; }
  .answer-block .label.audit-label { color: #ff9800; }
  .answer-block .answer-text { color: #a0b0c0; white-space: pre-wrap; }
  .audit-notes {
    background: #0f1520;
    border: 1px solid #2a1a10;
    border-radius: 6px;
    padding: 12px 14px;
    margin-top: 8px;
    font-size: 0.85em;
    line-height: 1.6;
    color: #d0a050;
  }
  .audit-notes .file-ref { color: #40c4ff; font-family: 'Consolas', monospace; font-size: 0.9em; }
  .audit-notes .val-match { color: #00e676; }
  .audit-notes .val-mismatch { color: #ff5252; }
  .audit-notes ul { margin: 6px 0 6px 18px; }
  .audit-notes li { margin-bottom: 4px; }
</style>
</head>

// Count statuses
let counts = { pass: 0, partial: 0, fail: 0, fixed: 0, total: 0 };
AUDIT.forEach(s => s.items.forEach(i => { counts[i.status]++; counts.total++; }));

// Summary bar
const summaryBar = document.getElementById('summaryBar');
summaryBar.innerHTML = `
  <div class="summary-stat"><div class="num">${counts.total}</div><div class="lbl">Total Questions</div></div>
  <div class="summary-stat pass"><div class="num">${counts.pass}</div><div class="lbl">Pass</div></div>
  <div class="summary-stat partial"><div class="num">${counts.partial}</div><div class="lbl">Partial</div></div>
  <div class="summary-stat fail"><div class="num">${counts.fail}</div><div class="lbl">Fail</div></div>
  <div class="summary-stat fixed"><div class="num">${counts.fixed}</div><div class="lbl">Fixed This Session</div></div>
`;

// Build sections
const container = document.getElementById('sections');
let globalIdx = 0;
AUDIT.forEach((section, si) => {
  const sec = document.createElement('div');
  sec.className = 'section';

  let sPass = 0, sFail = 0, sPartial = 0, sFixed = 0;
  section.items.forEach(i => {
    if (i.status === 'pass') sPass++;
    else if (i.status === 'fail') sFail++;
    else if (i.status === 'partial') sPartial++;
    else if (i.status === 'fixed') sFixed++;
  });

  let statsHtml = '';
  if (sPass) statsHtml += `<span class="status-badge status-pass">${sPass} pass</span>`;
  if (sPartial) statsHtml += `<span class="status-badge status-partial">${sPartial} partial</span>`;
  if (sFail) statsHtml += `<span class="status-badge status-fail">${sFail} fail</span>`;
  if (sFixed) statsHtml += `<span class="status-badge status-fixed">${sFixed} fixed</span>`;

  sec.innerHTML = `
    <div class="section-header" onclick="toggleSection(${si})">
      <h2>${section.title}</h2>
      <div class="section-stats">${statsHtml}</div>
    </div>
    <div class="section-body" id="body-${si}">
      ${section.items.map((item, qi) => {
        globalIdx++;
        const badgeClass = 'status-' + item.status;
        const badgeText = item.status === 'fixed' ? 'Fixed' : item.status === 'partial' ? 'Partial' : item.status === 'fail' ? 'Fail' : 'Pass';
        return `
          <div class="question-item" data-status="${item.status}">
            <div class="q-header">
              <span class="q-number">Q${globalIdx}</span>
              <span class="q-text">${item.q}</span>
              <span class="status-badge ${badgeClass}">${badgeText}</span>
            </div>
            <div class="answer-block">
              <div class="label ans-label">Your Answer</div>
              <div class="answer-text">${item.answer}</div>
            </div>
            <div class="audit-notes">
              <div class="label audit-label">Audit Notes</div>
              ${item.notes}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
  container.appendChild(sec);
});

function toggleSection(si) {
  const body = document.getElementById('body-' + si);
  body.classList.toggle('collapsed');
}

function filterAll(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.question-item').forEach(el => el.classList.remove('hidden'));
}

function filterBy(status, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.question-item').forEach(el => {
    el.classList.toggle('hidden', el.dataset.status !== status);
  });
}
